# Ops — prod diagnostics over the same OIDC→SSM channel as cd.yml. Manual
# only (workflow_dispatch → Actions tab). The command set is fixed on purpose:
# this is not a remote shell — code changes go through cd.yml/deploy.sh. One
# sanctioned mutation exists: rotate-service-token generates a fresh
# KANDIDLY_SERVICE_TOKEN on the box (the secret never leaves it — workflow
# inputs/logs would expose one passed from outside) and bounces the services
# that read it. Output lands in the workflow log (SSM truncates captured
# output at 24 000 chars; full logs stay on the box).
name: ops

on:
  workflow_dispatch:
    inputs:
      action:
        description: Diagnostic to run on the box
        type: choice
        required: true
        options:
          - logs-backend
          - logs-worker
          - logs-agent
          - logs-caddy
          - logs-minio-init
          - compose-ps
          - rotate-service-token
          - restart-caddy
          - presign-recording
          - enqueue-scoring
          - dump-scoring
          - reset-scoring
      tail:
        description: Log lines to tail
        type: string
        default: "300"
      arg:
        description: Action argument (presign-recording / enqueue-scoring; interview UUID)
        type: string
        default: ""

permissions:
  id-token: write # OIDC token for configure-aws-credentials
  contents: read

concurrency:
  group: prod-ops
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    # OIDC role trust matches sub repo:...:environment:production (docs §10),
    # so this job must claim the same environment as the deploy job.
    environment: production
    timeout-minutes: 10
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run diagnostic via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          ACTION: ${{ inputs.action }}
          TAIL: ${{ inputs.tail }}
          ARG: ${{ inputs.arg }}
        run: |
          set -euo pipefail
          [[ "$TAIL" =~ ^[0-9]+$ ]] || { echo "tail must be a number"; exit 1; }

          COMPOSE="docker compose -f /opt/kandidly/infra/compose.prod.yml"
          case "$ACTION" in
            logs-*) CMD="$COMPOSE logs --tail $TAIL --timestamps ${ACTION#logs-}" ;;
            compose-ps) CMD="$COMPOSE ps -a" ;;
            # Full process restart, not `caddy reload`: listener-level options
            # (e.g. `servers { protocols }`) only apply when the sockets are
            # rebound, and a config-only change never recreates the container
            # (bind-mounted Caddyfile, unchanged image/env).
            restart-caddy) CMD="$COMPOSE restart caddy && sleep 3 && $COMPOSE ps caddy" ;;
            # Mints a fresh 10-min presigned URL for an interview recording —
            # lets playback/delivery be debugged from outside without console
            # credentials. Short-lived + private repo logs = acceptable.
            presign-recording)
              [[ "$ARG" =~ ^[0-9a-f-]{36}$ ]] || { echo "arg must be an interview uuid"; exit 1; }
              CMD="$COMPOSE exec -T backend /app/.venv/bin/python -c \"import asyncio; from app.core import storage; print(asyncio.run(storage.presign_get(storage.BUCKET_RECORDINGS, '$ARG/audio.ogg', public=True)))\""
              ;;
            # Re-enqueues run_scoring for an interview whose scoring job died
            # (e.g. killed by the arq job timeout — arq never retries those).
            # Safe to repeat: the job reuses the existing ScoringJob row and
            # skips already-persisted criterion scores.
            enqueue-scoring)
              [[ "$ARG" =~ ^[0-9a-f-]{36}$ ]] || { echo "arg must be an interview uuid"; exit 1; }
              CMD="$COMPOSE exec -T backend /app/.venv/bin/python -c \"import asyncio; from app.core.queue import enqueue; asyncio.run(enqueue('run_scoring', '$ARG')); print('enqueued run_scoring $ARG')\""
              ;;
            # Prints an interview's scoring state (turns, criterion scores with
            # per-quote verification, evaluations) as JSON — for debugging
            # evidence-verification failures. Truncated previews of candidate
            # speech land in the (private-repo) workflow log; same trade-off
            # already accepted for presign-recording.
            dump-scoring)
              [[ "$ARG" =~ ^[0-9a-f-]{36}$ ]] || { echo "arg must be an interview uuid"; exit 1; }
              CMD="$COMPOSE exec -T -e PYTHONPATH=/app/backend backend /app/.venv/bin/python /app/backend/scripts/dump_scoring.py $ARG"
              ;;
            # Wipes scoring artifacts (job + scores + evaluations + report) and
            # re-runs scoring from scratch — the recovery path after a scoring
            # fix, where enqueue-scoring would no-op on the 'done' job row.
            reset-scoring)
              [[ "$ARG" =~ ^[0-9a-f-]{36}$ ]] || { echo "arg must be an interview uuid"; exit 1; }
              CMD="$COMPOSE exec -T -e PYTHONPATH=/app/backend backend /app/.venv/bin/python /app/backend/scripts/reset_scoring.py $ARG"
              ;;
            # Generates the token ON the box, rewrites the .env.prod line,
            # recreates the services that read it, then proves auth works by
            # curling /internal from inside the backend container (expect 404
            # for the dummy id; 401 means the token still doesn't match).
            rotate-service-token)
              CMD='set -e; f=/opt/kandidly/infra/.env.prod; tok=$(openssl rand -hex 32); if grep -q "^KANDIDLY_SERVICE_TOKEN=" "$f"; then sed -i "s/^KANDIDLY_SERVICE_TOKEN=.*/KANDIDLY_SERVICE_TOKEN=$tok/" "$f"; else printf "KANDIDLY_SERVICE_TOKEN=%s\n" "$tok" >> "$f"; fi; chown ec2-user:ec2-user "$f"; chmod 600 "$f"; docker compose -f /opt/kandidly/infra/compose.prod.yml up -d backend worker agent; sleep 25; docker compose -f /opt/kandidly/infra/compose.prod.yml exec -T backend sh -c "curl -s -o /dev/null -w \"internal-auth-status:%{http_code}\n\" -H \"X-Service-Token: \$KANDIDLY_SERVICE_TOKEN\" http://localhost:8000/internal/interviews/00000000-0000-0000-8000-000000000000/bootstrap"'
              ;;
            *) echo "unknown action: $ACTION"; exit 1 ;;
          esac

          # jq builds the parameter JSON so the command survives quoting.
          PARAMS=$(jq -cn --arg c "$CMD" '{commands: [$c]}')
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "kandidly ops: $ACTION" \
            --timeout-seconds 300 \
            --parameters "$PARAMS" \
            --query Command.CommandId --output text)
          echo "SSM command: $COMMAND_ID"

          while true; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query Status --output text)
            case "$STATUS" in
              Pending|InProgress|Delayed) sleep 5 ;;
              *) break ;;
            esac
          done

          echo "=== stdout ($STATUS) ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query StandardOutputContent --output text
          echo "=== stderr ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query StandardErrorContent --output text >&2
          [ "$STATUS" = "Success" ]
