# Ops — read-only prod diagnostics over the same OIDC→SSM channel as cd.yml.
# Manual only (workflow_dispatch → Actions tab). The command set is fixed on
# purpose: this stays diagnostics, not a remote shell — anything that mutates
# the box goes through cd.yml/deploy.sh. Output lands in the workflow log
# (SSM truncates captured output at 24 000 chars; full logs stay on the box).
name: ops

on:
  workflow_dispatch:
    inputs:
      action:
        description: Diagnostic to run on the box
        type: choice
        required: true
        options:
          - logs-backend
          - logs-worker
          - logs-agent
          - logs-caddy
          - logs-minio-init
          - compose-ps
      tail:
        description: Log lines to tail
        type: string
        default: "300"

permissions:
  id-token: write # OIDC token for configure-aws-credentials
  contents: read

concurrency:
  group: prod-ops
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    # OIDC role trust matches sub repo:...:environment:production (docs §10),
    # so this job must claim the same environment as the deploy job.
    environment: production
    timeout-minutes: 10
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run diagnostic via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          ACTION: ${{ inputs.action }}
          TAIL: ${{ inputs.tail }}
        run: |
          set -euo pipefail
          [[ "$TAIL" =~ ^[0-9]+$ ]] || { echo "tail must be a number"; exit 1; }

          COMPOSE="docker compose -f /opt/kandidly/infra/compose.prod.yml"
          case "$ACTION" in
            logs-*) CMD="$COMPOSE logs --tail $TAIL --timestamps ${ACTION#logs-}" ;;
            compose-ps) CMD="$COMPOSE ps -a" ;;
            *) echo "unknown action: $ACTION"; exit 1 ;;
          esac

          # jq builds the parameter JSON so the command survives quoting.
          PARAMS=$(jq -cn --arg c "$CMD" '{commands: [$c]}')
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "kandidly ops: $ACTION" \
            --timeout-seconds 300 \
            --parameters "$PARAMS" \
            --query Command.CommandId --output text)
          echo "SSM command: $COMMAND_ID"

          while true; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query Status --output text)
            case "$STATUS" in
              Pending|InProgress|Delayed) sleep 5 ;;
              *) break ;;
            esac
          done

          echo "=== stdout ($STATUS) ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query StandardOutputContent --output text
          echo "=== stderr ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
            --query StandardErrorContent --output text >&2
          [ "$STATUS" = "Success" ]
